<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India — Interactive State Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --teal: #1a6b5e;
    --teal-light: #2a9d8f;
    --text: #e6edf3;
    --muted: #8b949e;
    --state-fill: #1e4a3d;
    --state-hover: #2a9d8f;
    --state-stroke: #0d1117;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .bg-grain {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 16px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 3vw, 2.4rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .map-wrapper {
    position: relative;
    z-index: 2;
    width: min(520px, 94vw);
  }

  svg#india-map {
    width: 100%;
    height: auto;
    filter: drop-shadow(0 8px 40px rgba(42,157,143,0.15));
  }

  .state-path {
    fill: var(--state-fill);
    stroke: var(--state-stroke);
    stroke-width: 0.8;
    transition: fill 0.2s ease, filter 0.2s ease;
    cursor: pointer;
  }

  .state-path:hover {
    fill: var(--state-hover);
    filter: brightness(1.25) drop-shadow(0 0 6px rgba(42,157,143,0.6));
  }

  .state-path.active {
    fill: var(--gold);
    filter: brightness(1.1) drop-shadow(0 0 10px rgba(212,168,67,0.5));
  }

  /* Tooltip */
  #tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.15s ease;
  }

  #tooltip.visible { opacity: 1; }

  .tooltip-inner {
    background: #1c2733;
    border: 1px solid var(--gold);
    border-radius: 8px;
    padding: 10px 16px;
    min-width: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  .tooltip-state {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--gold-light);
    margin-bottom: 2px;
  }

  .tooltip-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  .tooltip-capital {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text);
    margin-top: 1px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 6px 0;
  }

  footer {
    position: relative;
    z-index: 2;
    margin-top: 14px;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>
<div class="bg-grain"></div>

<header>
  <h1>Bharat — भारत</h1>
  <p>Hover over a state to explore</p>
</header>

<div class="map-wrapper">
  <svg id="india-map" viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div id="tooltip">
  <div class="tooltip-inner">
    <div class="tooltip-label">State</div>
    <div class="tooltip-state" id="tt-state">—</div>
    <div class="divider"></div>
    <div class="tooltip-label">Capital</div>
    <div class="tooltip-capital" id="tt-capital">—</div>
  </div>
</div>

<footer>28 States · 8 Union Territories · Hover to Discover</footer>

<script>
const capitals = {
  "Andhra Pradesh": "Amaravati",
  "Arunachal Pradesh": "Itanagar",
  "Assam": "Dispur",
  "Bihar": "Patna",
  "Chhattisgarh": "Raipur",
  "Goa": "Panaji",
  "Gujarat": "Gandhinagar",
  "Haryana": "Chandigarh",
  "Himachal Pradesh": "Shimla",
  "Jharkhand": "Ranchi",
  "Karnataka": "Bengaluru",
  "Kerala": "Thiruvananthapuram",
  "Madhya Pradesh": "Bhopal",
  "Maharashtra": "Mumbai",
  "Manipur": "Imphal",
  "Meghalaya": "Shillong",
  "Mizoram": "Aizawl",
  "Nagaland": "Kohima",
  "Odisha": "Bhubaneswar",
  "Punjab": "Chandigarh",
  "Rajasthan": "Jaipur",
  "Sikkim": "Gangtok",
  "Tamil Nadu": "Chennai",
  "Telangana": "Hyderabad",
  "Tripura": "Agartala",
  "Uttar Pradesh": "Lucknow",
  "Uttarakhand": "Dehradun",
  "West Bengal": "Kolkata",
  "Andaman and Nicobar Islands": "Port Blair",
  "Chandigarh": "Chandigarh",
  "Dadra and Nagar Haveli and Daman and Diu": "Daman",
  "Delhi": "New Delhi",
  "Jammu and Kashmir": "Srinagar (Summer) / Jammu (Winter)",
  "Ladakh": "Leh",
  "Lakshadweep": "Kavaratti",
  "Puducherry": "Puducherry"
};

const tooltip = document.getElementById('tooltip');
const ttState = document.getElementById('tt-state');
const ttCapital = document.getElementById('tt-capital');

async function loadMap() {
  const svg = d3.select('#india-map');
  
  // Fetch GeoJSON from a public source
  const geojsonUrl = 'https://raw.githubusercontent.com/geohacker/india/master/state/india_telengana.geojson';
  
  let geoData;
  try {
    const res = await fetch(geojsonUrl);
    geoData = await res.json();
  } catch(e) {
    svg.append('text')
      .attr('x', 300).attr('y', 350)
      .attr('text-anchor', 'middle')
      .attr('fill', '#8b949e')
      .attr('font-size', '14')
      .text('Map data unavailable (network issue)');
    return;
  }

  const projection = d3.geoMercator().fitSize([600, 700], geoData);
  const path = d3.geoPath().projection(projection);

  svg.selectAll('path')
    .data(geoData.features)
    .join('path')
    .attr('class', 'state-path')
    .attr('d', path)
    .on('mousemove', function(event, d) {
      const name = d.properties.NAME_1 || d.properties.name || d.properties.ST_NM || 'Unknown';
      const capital = capitals[name] || '—';
      ttState.textContent = name;
      ttCapital.textContent = capital;
      tooltip.classList.add('visible');
      const x = event.clientX + 16;
      const y = event.clientY - 10;
      tooltip.style.left = Math.min(x, window.innerWidth - 200) + 'px';
      tooltip.style.top = Math.min(y, window.innerHeight - 120) + 'px';
    })
    .on('mouseleave', function() {
      tooltip.classList.remove('visible');
      d3.selectAll('.state-path').classed('active', false);
    })
    .on('mouseenter', function(event, d) {
      d3.selectAll('.state-path').classed('active', false);
      d3.select(this).classed('active', true);
    });
}

loadMap();
</script>
</body>
</html>
